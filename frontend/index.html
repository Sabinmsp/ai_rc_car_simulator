<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AI RC Car Simulator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header class="topbar">
    <h1>AI RC Car Simulator</h1>
    <div class="connection">
      <span id="status-dot" class="dot offline"></span>
      <span id="status-text">disconnected</span>
      <button id="btn-connect">Connect</button>
      <button id="btn-reset" disabled>Reset world</button>
    </div>
  </header>

  <main class="main">
    <section class="panel room-panel">
      <h2>Room</h2>
      <canvas id="room" width="500" height="500"></canvas>
      <div class="legend">
        <span><span class="emoji">🚗</span> car</span>
        <span><span class="sw fov"></span> camera FOV</span>
        <span><span class="sw wall"></span> wall</span>
        <span><span class="emoji">⚽</span> football</span>
        <span><span class="emoji">🔑</span> key</span>
        <span><span class="emoji">🪑</span> chair</span>
        <span><span class="emoji">🐶</span> dog</span>
      </div>
    </section>

    <section class="chat-panel">
      <div class="phone">
        <div class="phone-island"></div>
        <div class="phone-screen">
          <div class="phone-statusbar">
            <span id="phone-time" class="sb-time">9:41</span>
            <span class="sb-right">
              <span class="sb-signal" title="signal">
                <i></i><i></i><i></i><i></i>
              </span>
              <span class="sb-wifi" aria-hidden="true">
                <svg viewBox="0 0 20 14" width="16" height="11">
                  <path d="M10 13.5l2-2a2.8 2.8 0 0 0-4 0l2 2zm3.5-3.5l1.4-1.4a6.4 6.4 0 0 0-9.8 0L6.5 10a4.4 4.4 0 0 1 7 0zm3.5-3.5L18.4 5A10 10 0 0 0 1.6 5L3 6.5a8 8 0 0 1 14 0z" fill="currentColor"/>
                </svg>
              </span>
              <span class="sb-battery" aria-label="battery">
                <span class="sb-battery-body"><span class="sb-battery-fill"></span></span>
                <span class="sb-battery-cap"></span>
              </span>
            </span>
          </div>

          <header class="phone-appbar">
            <div class="phone-contact">
              <div class="phone-avatar">🚗</div>
              <div class="phone-title">
                <div class="phone-name">RC Car</div>
                <div class="phone-sub">iMessage</div>
              </div>
            </div>
          </header>

          <div id="chat" class="chat"></div>

          <div class="quick-buttons">
            <button data-cmd="scan the room">Scan</button>
            <button data-cmd="find the football">⚽ Football</button>
            <button data-cmd="find the key">🔑 Key</button>
            <button data-cmd="find the dog">🐶 Dog</button>
            <button data-cmd="stop" class="danger">Stop</button>
          </div>

          <form id="chat-form" class="chat-form">
            <input id="chat-input" type="text" placeholder="iMessage" autocomplete="off" />
            <button type="submit" aria-label="Send">
              <svg viewBox="0 0 24 24" width="18" height="18"><path d="M4 12l16-8-6 16-2-7-8-1z" fill="currentColor"/></svg>
            </button>
          </form>

          <div class="phone-home"></div>
        </div>
      </div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
